<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swaft Academy — Dashboard</title>
  <link rel="stylesheet" href="css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

  <!-- Mobile Menu Button -->
  <button class="mobile-menu-btn btn" id="mobileMenuBtn" onclick="toggleSidebar()">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <div class="app-layout">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">🎓</div>
        <div>
          <div class="logo-text gradient-text">Swaft Academy</div>
          <div class="logo-sub" id="sidebarRoleBadge">Select Role</div>
        </div>
      </div>

      <div class="sidebar-user" id="sidebarUser" style="display:none;cursor:pointer" onclick="navigateTo('settings')">
        <div class="avatar" id="userAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="userName">—</div>
          <div class="user-role" id="userRole">—</div>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <!-- Populated by JS -->
      </nav>

      <div class="sidebar-footer">
        <a href="index.html" class="btn btn-secondary w-100" style="justify-content:center">🏠 Home</a>
        <button class="btn btn-outline w-100 mt-1"
          style="justify-content:center;font-size:0.78rem;color:var(--text-muted)"
          onclick="if(confirm('Reset all data to defaults?')){resetStore();location.reload();}">🔄 Reset Data</button>
      </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">

      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-title" id="topbarTitle">📊 Dashboard</div>
        <div class="topbar-actions">
          <div style="position:relative">
            <button class="notif-btn" onclick="toggleNotifPanel()" id="notifBellBtn">
              🔔 <span class="notif-dot" id="notifDot" style="display:none"></span>
              <span id="notifBadgeCount"
                style="display:none;position:absolute;top:-4px;right:-4px;background:var(--accent);color:#fff;font-size:0.6rem;font-weight:800;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center"></span>
            </button>
            <div id="notifPanel"
              style="display:none;position:absolute;right:0;top:110%;width:400px;max-height:520px;overflow-y:auto;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);z-index:1000;padding:0">
              <div
                style="padding:0.85rem 1rem;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center">
                <span style="font-weight:700;font-size:0.95rem">🔔 Notifications</span>
                <div id="notifPanelActions" style="display:flex;gap:0.4rem"></div>
              </div>
              <div id="notifComposeArea" style="display:none"></div>
              <div id="notifPanelList" style="padding:0.5rem"></div>
            </div>
          </div>
          <div class="avatar avatar-sm" id="topbarAvatar" style="cursor:pointer" onclick="navigateTo('settings')">?
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <div class="page-content" id="pageContent">
        <!-- Role Selector (shown before role is chosen) -->
        <div id="roleSelector"
          style="min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
          <div style="font-size:3rem;margin-bottom:1rem">🎓</div>
          <h1 style="font-size:1.8rem;margin-bottom:0.5rem" class="gradient-text">Welcome to Swaft Academy</h1>
          <p style="color:var(--text-secondary);margin-bottom:2.5rem">Select your role to access the dashboard</p>
          <div class="grid-3" style="max-width:900px;width:100%">
            <div class="role-card tutor" onclick="initRole('tutor')">
              <div class="role-icon">🧑‍🏫</div>
              <div class="role-title gradient-text">Tutor</div>
              <div class="role-desc">Manage students, classes, tests & fees</div>
              <button class="btn btn-primary w-100 mt-2" style="justify-content:center">Enter →</button>
            </div>
            <div class="role-card student" onclick="window.location.href='index.html#choose-role'">
              <div class="role-icon">🧑‍🎓</div>
              <div class="role-title" style="color:var(--secondary)">Student</div>
              <div class="role-desc">Login required — use your PIN</div>
              <button class="btn w-100 mt-2"
                style="justify-content:center;background:rgba(0,212,170,0.15);color:var(--secondary);border:1px solid rgba(0,212,170,0.3)">Login
                →</button>
            </div>
            <div class="role-card parent" onclick="window.location.href='index.html#choose-role'">
              <div class="role-icon">👪</div>
              <div class="role-title" style="color:var(--accent-orange)">Parent</div>
              <div class="role-desc">Login required — use student PIN</div>
              <button class="btn w-100 mt-2"
                style="justify-content:center;background:rgba(255,154,60,0.15);color:var(--accent-orange);border:1px solid rgba(255,154,60,0.3)">Login
                →</button>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="js/syllabus-data.js?v=1.1"></script>
  <script src="js/data-store.js?v=1.1"></script>
  <script src="js/app.js?v=1.1"></script>
  <script src="js/tutor-pages.js?v=1.1"></script>
  <script src="js/tutor-content.js?v=1.1"></script>
  <script src="js/student-pages.js?v=1.1"></script>
  <script>
    // ===== SIDEBAR NAVS =====
    const NAV_CONFIGS = {
      tutor: {
        navSections: [
          {
            label: 'Overview', items: [
              { icon: '📊', label: 'Dashboard', page: 'dashboard' },
              { icon: '🗓️', label: 'Schedule', page: 'schedule' },
              { icon: '⚙️', label: 'Settings', page: 'settings' },
            ]
          },
          {
            label: 'Students', items: [
              { icon: '👩‍🎓', label: 'Students', page: 'students' },
              { icon: '📅', label: 'Attendance', page: 'attendance' },
              { icon: '💬', label: 'Doubts', page: 'doubts' },
            ]
          },
          {
            label: 'Academics', items: [
              { icon: '📝', label: 'Homework', page: 'homework' },
              { icon: '🧪', label: 'Tests', page: 'tests' },
              { icon: '📔', label: 'Teaching Log', page: 'teachinglog' },
              { icon: '📚', label: 'Content Library', page: 'content' },
            ]
          },
          {
            label: 'Finance', items: [
              { icon: '💰', label: 'Fees', page: 'fees' },
            ]
          }
        ]
      },
      student: {
        navSections: [
          {
            label: 'Learn', items: [
              { icon: '📊', label: 'Dashboard', page: 'dashboard' },
              { icon: '🎬', label: 'Video Library', page: 'videos' },
              { icon: '✏️', label: 'Practice', page: 'practice' },
              { icon: '🃏', label: 'Flashcards', page: 'flashcards' },
              { icon: '⚙️', label: 'Settings', page: 'settings' },
            ]
          },
          {
            label: 'Progress', items: [
              { icon: '📈', label: 'My Progress', page: 'progress' },
              { icon: '🏆', label: 'Leaderboard', page: 'leaderboard' },
              { icon: '💬', label: 'Doubts', page: 'doubts' },
            ]
          }
        ]
      },
      parent: {
        navSections: [
          {
            label: 'Child Overview', items: [
              { icon: '📊', label: 'Dashboard', page: 'dashboard' },
              { icon: '💰', label: 'Fee Details', page: 'fees' },
              { icon: '📋', label: 'Report Card', page: 'report' },
              { icon: '🔔', label: 'Updates', page: 'notifications' },
              { icon: '⚙️', label: 'Settings', page: 'settings' },
            ]
          }
        ]
      }
    };

    function buildSidebar(role) {
      const config = NAV_CONFIGS[role];
      if (!config) return;

      document.getElementById('sidebarUser').style.display = 'flex';
      let displayName, displayRole, displayAvatar;

      if (role === 'tutor') {
        const profile = Store_getTutorProfile();
        displayName = profile.name || 'Tutor';
        displayRole = 'Tutor — ' + (profile.subject || 'Physics & Math');
        displayAvatar = (profile.name || 'TU').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      } else if (role === 'student') {
        displayName = APP.currentUser ? APP.currentUser.name : 'Student';
        displayRole = `Student — Class ${APP.currentUser?.class || '—'}`;
        displayAvatar = APP.currentUser ? APP.currentUser.avatar : '??';
      } else {
        displayName = APP.currentUser ? APP.currentUser.name + "'s Parent" : 'Parent';
        displayRole = `Parent — ${APP.currentUser?.name || '—'}'s Parent`;
        displayAvatar = APP.currentUser ? APP.currentUser.avatar : '??';
      }

      document.getElementById('userAvatar').textContent = displayAvatar;
      document.getElementById('userName').textContent = displayName;
      document.getElementById('userRole').textContent = displayRole;
      document.getElementById('topbarAvatar').textContent = displayAvatar;
      document.getElementById('sidebarRoleBadge').textContent = role.charAt(0).toUpperCase() + role.slice(1) + ' Portal';

      const nav = document.getElementById('sidebarNav');
      let html = '';
      config.navSections.forEach(section => {
        html += `<div class="nav-section-label">${section.label}</div>`;
        section.items.forEach(item => {
          html += `<div class="nav-item" data-page="${item.page}" onclick="navigateTo('${item.page}','${role}')">
          <span class="nav-icon">${item.icon}</span><span>${item.label}</span>
          ${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}
        </div>`;
        });
      });
      nav.innerHTML = html;
    }

    function initRole(role, studentObj) {
      APP.currentRole = role;
      if (studentObj) {
        APP.currentUser = studentObj;
        APP.currentStudentId = studentObj.id;
      }
      document.getElementById('roleSelector').style.display = 'none';
      buildSidebar(role);
      navigateTo('dashboard', role);
    }

    // ===== AUTO-INIT FROM URL =====
    const urlParams = new URLSearchParams(window.location.search);
    const urlRole = urlParams.get('role') || urlParams.get('demo');
    const urlStudentId = urlParams.get('studentId');

    if (urlRole === 'tutor' || urlRole === 'demo') {
      initRole('tutor');
    } else if ((urlRole === 'student' || urlRole === 'parent') && urlStudentId) {
      const student = Store_getStudent(parseInt(urlStudentId));
      if (student) {
        initRole(urlRole, student);
      } else {
        // Student not found, show selector
      }
    }

    window.initRole = initRole;

    // ===== NOTIFICATION PANEL =====
    function toggleNotifPanel() {
      const panel = document.getElementById('notifPanel');
      if (!panel) return;
      const isOpen = panel.style.display !== 'none';
      panel.style.display = isOpen ? 'none' : 'block';
      if (!isOpen) renderNotifPanel();
    }

    function renderNotifPanel() {
      const list = document.getElementById('notifPanelList');
      const actions = document.getElementById('notifPanelActions');
      const compose = document.getElementById('notifComposeArea');
      if (!list) return;

      // Actions: only tutor gets Clear All and + New
      if (actions) {
        if (APP.currentRole === 'tutor') {
          actions.innerHTML = `
          <button class="btn btn-sm btn-primary" style="font-size:0.7rem;padding:0.25rem 0.5rem" onclick="toggleNotifCompose()">+ New</button>
          <button class="btn btn-sm btn-outline" style="font-size:0.7rem;padding:0.25rem 0.5rem" onclick="clearAllNotifications()">Clear All</button>`;
        } else {
          actions.innerHTML = '';
        }
      }

      // Hide compose by default on render
      if (compose) compose.style.display = 'none';

      // Get notifications
      let notifs = [];
      if (APP.currentRole === 'tutor') {
        notifs = Store_getNotifications();
      } else if (APP.currentRole === 'student' || APP.currentRole === 'parent') {
        notifs = Store_getNotifications(APP.currentStudentId);
      }
      if (notifs.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-muted);font-size:0.85rem">No notifications yet</div>';
        return;
      }
      const icons = { homework: '📝', test: '🧪', fee: '💰', broadcast: '📢', request: '🔑' };
      const isTutor = APP.currentRole === 'tutor';
      list.innerHTML = notifs.slice(0, 20).map(n => {
        const icon = icons[n.type] || '🔔';
        return `
      <div style="display:flex;gap:0.75rem;padding:0.65rem 0.5rem;border-bottom:1px solid var(--border-light);align-items:flex-start">
        <div style="font-size:1.3rem;min-width:28px;text-align:center;cursor:pointer" onclick="handleNotifClick('${n.type}',${n.requestingStudentId || 0})">${icon}</div>
        <div style="flex:1;min-width:0;cursor:pointer" onclick="handleNotifClick('${n.type}',${n.requestingStudentId || 0})">
          <div style="font-weight:600;font-size:0.82rem;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${n.title}</div>
          <div style="font-size:0.78rem;color:var(--text-secondary);margin-top:0.15rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${n.message}</div>
          <div style="font-size:0.68rem;color:var(--text-muted);margin-top:0.25rem">${n.date}</div>
        </div>
        ${isTutor ? `<button onclick="deleteSingleNotification(${n.id})" style="background:none;border:none;cursor:pointer;font-size:0.85rem;color:var(--text-muted);padding:0.2rem;min-width:24px" title="Delete">✕</button>` : ''}
      </div>`;
      }).join('');
    }

    function deleteSingleNotification(id) {
      Store_deleteNotification(id);
      renderNotifPanel();
      updateNotifBadge();
    }

    function toggleNotifCompose() {
      const compose = document.getElementById('notifComposeArea');
      if (!compose) return;
      if (compose.style.display !== 'none') {
        compose.style.display = 'none';
        return;
      }
      const students = Store_getStudents();
      compose.style.display = 'block';
      compose.innerHTML = `
      <div style="padding:0.75rem 1rem;border-bottom:1px solid var(--border-light);background:rgba(108,99,255,0.05)">
        <div style="font-weight:700;font-size:0.82rem;margin-bottom:0.5rem;color:var(--primary-light)">📢 Send Notification</div>
        <select id="notifTargetType" class="form-control" style="font-size:0.8rem;padding:0.35rem 0.6rem;margin-bottom:0.4rem" onchange="onNotifTargetChange()">
          <option value="broadcast">📢 Broadcast to All</option>
          <option value="student">👨‍🎓 To Specific Students</option>
          <option value="parent">👨‍👩‍👦 To Specific Parents</option>
        </select>
        <div id="notifTargetStudentRow" style="display:none;margin-bottom:0.4rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.3rem">
            <span style="font-size:0.72rem;color:var(--text-muted)">Select recipients:</span>
            <div style="display:flex;gap:0.3rem">
              <button class="btn btn-sm btn-outline" style="font-size:0.65rem;padding:0.15rem 0.35rem" onclick="toggleAllStudentChecks(true)">All</button>
              <button class="btn btn-sm btn-outline" style="font-size:0.65rem;padding:0.15rem 0.35rem" onclick="toggleAllStudentChecks(false)">None</button>
            </div>
          </div>
          <div id="notifStudentChecks" style="max-height:120px;overflow-y:auto;border:1px solid var(--border-light);border-radius:var(--radius-md);padding:0.4rem">
            ${students.map(s => `<label style="display:flex;align-items:center;gap:0.4rem;padding:0.2rem 0;font-size:0.78rem;cursor:pointer"><input type="checkbox" class="notif-stu-check" value="${s.id}" checked> ${s.name} <span style="color:var(--text-muted)">(${s.class} ${s.board})</span></label>`).join('')}
          </div>
        </div>
        <input type="text" id="notifComposeTitle" class="form-control" placeholder="Title" style="font-size:0.8rem;padding:0.35rem 0.6rem;margin-bottom:0.4rem">
        <textarea id="notifComposeMsg" class="form-control" rows="2" placeholder="Message..." style="font-size:0.8rem;padding:0.35rem 0.6rem;margin-bottom:0.5rem"></textarea>
        <div style="display:flex;gap:0.4rem">
          <button class="btn btn-sm btn-primary" style="font-size:0.75rem;padding:0.3rem 0.6rem" onclick="doSendNotifFromPanel()">Send</button>
          <button class="btn btn-sm btn-secondary" style="font-size:0.75rem;padding:0.3rem 0.6rem" onclick="toggleNotifCompose()">Cancel</button>
        </div>
      </div>`;
    }

    function toggleAllStudentChecks(state) {
      document.querySelectorAll('.notif-stu-check').forEach(cb => cb.checked = state);
    }

    function onNotifTargetChange() {
      const type = document.getElementById('notifTargetType').value;
      const row = document.getElementById('notifTargetStudentRow');
      if (row) row.style.display = (type === 'student' || type === 'parent') ? 'block' : 'none';
    }

    function doSendNotifFromPanel() {
      const title = document.getElementById('notifComposeTitle').value.trim();
      const message = document.getElementById('notifComposeMsg').value.trim();
      if (!title || !message) { showToast('Title and message required', 'warning'); return; }
      const targetType = document.getElementById('notifTargetType').value;

      if (targetType === 'broadcast') {
        Store_addNotification({ title, message, type: 'broadcast', date: new Date().toISOString().split('T')[0] });
        showToast('Broadcast sent to all!', 'success');
      } else {
        const selectedIds = Array.from(document.querySelectorAll('.notif-stu-check:checked')).map(cb => parseInt(cb.value));
        if (selectedIds.length === 0) { showToast('Please select at least one student', 'warning'); return; }
        const notifType = targetType === 'parent' ? 'fee' : 'broadcast';
        selectedIds.forEach(sid => {
          Store_addParentNotification(sid, title, message, notifType);
        });
        const names = selectedIds.map(sid => Store_getStudent(sid)?.name || 'Student').join(', ');
        showToast(`Notification sent to ${selectedIds.length} recipient${selectedIds.length > 1 ? 's' : ''}: ${names}`, 'success');
      }
      toggleNotifCompose();
      renderNotifPanel();
      updateNotifBadge();
    }

    function handleNotifClick(type, studentId) {
      document.getElementById('notifPanel').style.display = 'none';
      if (APP.currentRole === 'tutor') {
        if (type === 'request' && studentId) {
          openSetLoginModal(studentId);
        } else if (type === 'request') {
          navigateTo('dashboard', 'tutor');
        } else {
          navigateTo('teachinglog', 'tutor');
        }
      } else if (APP.currentRole === 'student') {
        navigateTo('dashboard', 'student');
      } else {
        navigateTo('notifications', 'parent');
      }
    }

    function clearAllNotifications() {
      if (!confirm('Clear all notifications?')) return;
      const data = getStore();
      data.notifications = [];
      saveStore(data);
      renderNotifPanel();
      updateNotifBadge();
      showToast('All notifications cleared', 'success');
    }

    function updateNotifBadge() {
      const dot = document.getElementById('notifDot');
      const badge = document.getElementById('notifBadgeCount');
      if (!dot || !badge) return;
      let notifs = [];
      if (APP.currentRole === 'tutor') {
        notifs = Store_getNotifications();
      } else if (APP.currentRole === 'student' || APP.currentRole === 'parent') {
        notifs = Store_getNotifications(APP.currentStudentId);
      }
      const count = notifs.length;
      if (count > 0) {
        dot.style.display = 'block';
        badge.style.display = 'flex';
        badge.textContent = count > 9 ? '9+' : count;
      } else {
        dot.style.display = 'none';
        badge.style.display = 'none';
      }
    }

    // Close notif panel when clicking outside
    document.addEventListener('click', function (e) {
      const panel = document.getElementById('notifPanel');
      const btn = document.getElementById('notifBellBtn');
      if (panel && panel.style.display !== 'none' && !panel.contains(e.target) && !btn.contains(e.target)) {
        panel.style.display = 'none';
      }
    });

    // Hook into navigateTo to update badge
    const _origNavigateTo = window.navigateTo;
    window.navigateTo = function () {
      _origNavigateTo.apply(this, arguments);
      setTimeout(updateNotifBadge, 150);
    };

    window.toggleNotifPanel = toggleNotifPanel;
    window.clearAllNotifications = clearAllNotifications;
    window.handleNotifClick = handleNotifClick;
    window.updateNotifBadge = updateNotifBadge;
    window.toggleNotifCompose = toggleNotifCompose;
    window.onNotifTargetChange = onNotifTargetChange;
    window.doSendNotifFromPanel = doSendNotifFromPanel;
    window.deleteSingleNotification = deleteSingleNotification;
    window.toggleAllStudentChecks = toggleAllStudentChecks;
  </script>
</body>

</html>
